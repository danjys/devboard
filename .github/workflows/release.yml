# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/release.yml
#
# Release Pipeline — triggered when a version tag is pushed (e.g. `v1.2.0`).
#
# What happens:
#   1. Build the Electron app for macOS (dmg + zip), Windows (nsis + zip),
#      and Linux (AppImage + deb) — in parallel using a matrix strategy.
#   2. Upload all installer artefacts to a new GitHub Release (auto-created
#      from the tag).
#
# How to trigger a release:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Free tier note:
#   • macOS runners consume GitHub Actions minutes at 10× the standard rate.
#     The free plan includes 2,000 minutes/month on public repos (unlimited)
#     and 2,000 minutes/month on private repos.
#   • To minimise minutes, the matrix is structured so each OS builds once.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # matches v1.0.0, v2.3.1-beta.0, etc.

# Only one release job should run at a time for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build installers (matrix: macOS · Windows · Linux) ───────────────────
  build:
    name: Build installer — ${{ matrix.os }}
    strategy:
      fail-fast: false   # don't cancel other platforms if one fails
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: 'release/**/*.{dmg,zip}'

          - os: windows-latest
            platform: win
            artifact_glob: 'release/**/*.{exe,zip}'

          - os: ubuntu-latest
            platform: linux
            artifact_glob: 'release/**/*.{AppImage,deb}'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Linux requires these libraries for Electron
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fakeroot \
            dpkg

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: release/
          retention-days: 14

  # ── Create GitHub Release and attach all artefacts ───────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a release and upload assets

    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/

      - name: List downloaded files
        run: find dist-all/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DevBoard ${{ github.ref_name }}"
          body: |
            ## DevBoard ${{ github.ref_name }}

            ### Download
            | Platform | Installer |
            |----------|-----------|
            | macOS    | `.dmg` (Intel + Apple Silicon) |
            | Windows  | `.exe` (NSIS installer) |
            | Linux    | `.AppImage` or `.deb` |

            ### What's included
            - All files from `dist-all/` (built by the matrix jobs above)

            ### Installation
            **macOS**: Open the `.dmg`, drag DevBoard to Applications.
            **Windows**: Run the `.exe` installer.
            **Linux**: `chmod +x DevBoard-*.AppImage && ./DevBoard-*.AppImage`

          files: |
            dist-all/**/*.dmg
            dist-all/**/*.zip
            dist-all/**/*.exe
            dist-all/**/*.AppImage
            dist-all/**/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
